<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NTE Drafts</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h1>LOGIN</h1>

            <input
                type="email"
                id="email"
                placeholder="Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
            >

            <div class="buttons">

                <button id="loginBtn">
                    LOGIN
                </button>

                <button id="registerBtn">
                    REGISTER
                </button>

            </div>

        </div>

    </div>

    <script type="module" src="app.js"></script>

</body>

</html>
