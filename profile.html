<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="profile-body">

    <aside class="sidebar">

        <button class="sidebar-btn">
            Home
        </button>

        <button class="sidebar-btn active">
            Profile
        </button>

        <button class="sidebar-btn">
            Drafts
        </button>

        <button class="sidebar-btn">
            Tournaments
        </button>

        <button class="sidebar-btn">
            Draft Systems
        </button>

        <button class="sidebar-btn">
            News
        </button>

    </aside>

    <main class="profile-main">

        <div class="topbar">

            <div class="user-card">

                <div class="avatar"></div>

                <div>

                    <h2 id="nickname">
                        Player
                    </h2>

                    <p id="emailText">
                        Loading...
                    </p>

                </div>

            </div>

        </div>

        <div class="tabs">

            <button class="tab active">
                Account
            </button>

            <button class="tab">
                Tournament
            </button>

        </div>

        <div class="preset-bar">

            <button class="preset active">
                Roster
            </button>

            <button class="preset">
                Preset 1
            </button>

            <button class="preset">
                Preset 2
            </button>

            <button class="add-btn">
                +
            </button>

        </div>

        <div class="section-title">

            <h1>
                Account Agents
            </h1>

            <button class="manage-btn">
                Manage Agents
            </button>

        </div>

        <div class="agents-grid">

            <div class="agent-card"></div>
            <div class="agent-card"></div>
            <div class="agent-card"></div>
            <div class="agent-card"></div>
            <div class="agent-card"></div>
            <div class="agent-card"></div>
            <div class="agent-card"></div>
            <div class="agent-card"></div>

        </div>

    </main>

    <script type="module" src="profile.js"></script>

</body>

</html>
